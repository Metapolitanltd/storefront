name: Build Image and Push to ECR

on:
  push:
    tags:
      - 'dev-v*.*.*'
      - 'stg-v*.*.*'
      - 'prd-v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  DEV_ECR_REPOSITORY: sleeve/dev/storefront
  STG_ECR_REPOSITORY: sleeve/stg/storefront
  PRD_ECR_REPOSITORY: sleeve/prd/storefront

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/prd-v') && 'production' || startsWith(github.ref, 'refs/tags/stg-v') && 'staging' || 'development' }}
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
      ecr_repository: ${{ steps.set-tag.outputs.ecr_repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag
        id: set-tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" =~ ^dev-v[0-9]+.[0-9]+.[0-9]+$ ]]; then
            ECR_REPOSITORY="${DEV_ECR_REPOSITORY}"
          elif [[ "$TAG" =~ ^stg-v[0-9]+.[0-9]+.[0-9]+$ ]]; then
            ECR_REPOSITORY="${STG_ECR_REPOSITORY}"
          elif [[ "$TAG" =~ ^prd-v[0-9]+.[0-9]+.[0-9]+$ ]]; then
            ECR_REPOSITORY="${PRD_ECR_REPOSITORY}"
          else
            echo "Tag $TAG is not a semantic env tag. Expected dev-vX.Y.Z, stg-vX.Y.Z, or prd-vX.Y.Z"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ecr_repository=$ECR_REPOSITORY" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Write build-time env file
        env:
          GTM_ID: ${{ vars.GTM_ID || secrets.GTM_ID }}
          SENTRY_SEND_DEFAULT_PII: ${{ vars.SENTRY_SEND_DEFAULT_PII || secrets.SENTRY_SEND_DEFAULT_PII }}
          SITE_URL: ${{ vars.SITE_URL }}
          STORE_FACEBOOK: ${{ vars.STORE_FACEBOOK }}
          STORE_INSTAGRAM: ${{ vars.STORE_INSTAGRAM }}
          STORE_LOGO_URL: ${{ vars.STORE_LOGO_URL }}
          STORE_META_DESCRIPTION: ${{ vars.STORE_META_DESCRIPTION }}
          STORE_META_KEYWORDS: ${{ vars.STORE_META_KEYWORDS }}
          STORE_SEO_TITLE: ${{ vars.STORE_SEO_TITLE }}
          STORE_SUPPORT_EMAIL: ${{ vars.STORE_SUPPORT_EMAIL }}
          STORE_TWITTER: ${{ vars.STORE_TWITTER }}
          NEXT_PUBLIC_ADYEN_CLIENT_KEY: ${{ vars.NEXT_PUBLIC_ADYEN_CLIENT_KEY }}
          NEXT_PUBLIC_ADYEN_ENVIRONMENT: ${{ vars.NEXT_PUBLIC_ADYEN_ENVIRONMENT }}
          NEXT_PUBLIC_AUTH_PROVIDER: ${{ vars.NEXT_PUBLIC_AUTH_PROVIDER }}
          NEXT_PUBLIC_DEFAULT_COUNTRY: ${{ vars.NEXT_PUBLIC_DEFAULT_COUNTRY }}
          NEXT_PUBLIC_DEFAULT_LOCALE: ${{ vars.NEXT_PUBLIC_DEFAULT_LOCALE }}
          NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${{ vars.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}
          NEXT_PUBLIC_SENTRY_SEND_DEFAULT_PII: ${{ vars.NEXT_PUBLIC_SENTRY_SEND_DEFAULT_PII }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_STORE_DESCRIPTION: ${{ vars.NEXT_PUBLIC_STORE_DESCRIPTION }}
          NEXT_PUBLIC_STORE_NAME: ${{ vars.NEXT_PUBLIC_STORE_NAME }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_VERCEL_PROJECT_PRODUCTION_URL: ${{ vars.NEXT_PUBLIC_VERCEL_PROJECT_PRODUCTION_URL }}
          NEXT_PUBLIC_VERO_AUTH_CB: ${{ vars.NEXT_PUBLIC_VERO_AUTH_CB }}
          NEXT_PUBLIC_VERO_BASE_URL: ${{ vars.NEXT_PUBLIC_VERO_BASE_URL }}
          VERO_SESSION_SECRET: ${{ secrets.VERO_SESSION_SECRET }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const names = [
            "GTM_ID",
            "SENTRY_SEND_DEFAULT_PII",
            "SITE_URL",
            "STORE_FACEBOOK",
            "STORE_INSTAGRAM",
            "STORE_LOGO_URL",
            "STORE_META_DESCRIPTION",
            "STORE_META_KEYWORDS",
            "STORE_SEO_TITLE",
            "STORE_SUPPORT_EMAIL",
            "STORE_TWITTER",
            "NEXT_PUBLIC_ADYEN_CLIENT_KEY",
            "NEXT_PUBLIC_ADYEN_ENVIRONMENT",
            "NEXT_PUBLIC_AUTH_PROVIDER",
            "NEXT_PUBLIC_DEFAULT_COUNTRY",
            "NEXT_PUBLIC_DEFAULT_LOCALE",
            "NEXT_PUBLIC_PAYPAL_CLIENT_ID",
            "NEXT_PUBLIC_SENTRY_SEND_DEFAULT_PII",
            "NEXT_PUBLIC_SITE_URL",
            "NEXT_PUBLIC_STORE_DESCRIPTION",
            "NEXT_PUBLIC_STORE_NAME",
            "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY",
            "NEXT_PUBLIC_VERCEL_PROJECT_PRODUCTION_URL",
            "NEXT_PUBLIC_VERO_AUTH_CB",
            "NEXT_PUBLIC_VERO_BASE_URL",
            "VERO_SESSION_SECRET",
          ];

          const lines = names
            .filter((name) => process.env[name])
            .map((name) => `${name}=${JSON.stringify(process.env[name])}`);

          fs.writeFileSync(".env.production", `${lines.join("\n")}\n`);
          NODE

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.set-tag.outputs.ecr_repository }}:${{ steps.set-tag.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.set-tag.outputs.ecr_repository }}:latest
          build-args: |
            SPREE_API_URL=${{ secrets.SPREE_API_URL }}
            SPREE_PUBLISHABLE_KEY=${{ secrets.SPREE_PUBLISHABLE_KEY }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ steps.set-tag.outputs.ecr_repository }}:buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ steps.set-tag.outputs.ecr_repository }}:buildcache,mode=max,image-manifest=true
          platforms: linux/amd64
